<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" shape-rendering="crispEdges">
  <!-- Ninja dash frame 2 - full sprint -->
  <rect x="22" y="6" width="16" height="4" fill="#2d2d2d"/>
  <rect x="20" y="10" width="18" height="4" fill="#2d2d2d"/>
  <rect x="24" y="10" width="4" height="4" fill="#ffffff"/>
  <rect x="32" y="10" width="4" height="4" fill="#ffffff"/>
  <rect x="26" y="12" width="2" height="2" fill="#111111"/>
  <rect x="34" y="12" width="2" height="2" fill="#111111"/>
  <rect x="20" y="8" width="18" height="2" fill="#cc3333"/>
  <!-- Body more horizontal -->
  <rect x="16" y="14" width="18" height="10" fill="#1a1a2e"/>
  <rect x="16" y="20" width="18" height="2" fill="#cc3333"/>
  <!-- Arms back -->
  <rect x="4" y="16" width="12" height="4" fill="#1a1a2e"/>
  <rect x="2" y="18" width="4" height="4" fill="#e8c39e"/>
  <!-- Right arm forward with kunai hint -->
  <rect x="34" y="12" width="8" height="4" fill="#1a1a2e"/>
  <rect x="40" y="12" width="4" height="4" fill="#e8c39e"/>
  <rect x="44" y="12" width="4" height="2" fill="#aaaaaa"/>
  <!-- Legs split wide -->
  <rect x="18" y="24" width="6" height="10" fill="#1a1a2e"/>
  <rect x="30" y="26" width="6" height="6" fill="#1a1a2e"/>
  <rect x="14" y="34" width="8" height="4" fill="#4a3728"/>
  <rect x="34" y="32" width="8" height="4" fill="#4a3728"/>
  <!-- Scarf flying back long -->
  <rect x="6" y="8" width="14" height="2" fill="#cc3333"/>
  <rect x="2" y="10" width="10" height="2" fill="#cc3333"/>
  <rect x="0" y="12" width="6" height="2" fill="#cc3333"/>
  <!-- Speed lines -->
  <rect x="0" y="18" width="8" height="2" fill="#ffffff" opacity="0.4"/>
  <rect x="2" y="22" width="6" height="2" fill="#ffffff" opacity="0.3"/>
  <rect x="0" y="26" width="4" height="2" fill="#ffffff" opacity="0.2"/>
</svg>