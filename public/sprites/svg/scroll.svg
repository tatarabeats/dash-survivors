<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="crispEdges">
  <!-- Scroll / power-up item -->
  <!-- Top roll -->
  <rect x="8" y="4" width="16" height="4" fill="#d4a853"/>
  <rect x="6" y="4" width="4" height="4" fill="#c49843"/>
  <rect x="22" y="4" width="4" height="4" fill="#c49843"/>
  <rect x="8" y="4" width="16" height="2" fill="#e4b863"/>
  <!-- Paper body -->
  <rect x="10" y="8" width="12" height="16" fill="#f5e6c8"/>
  <rect x="10" y="8" width="2" height="16" fill="#e8d6b0"/>
  <!-- Kanji markings -->
  <rect x="14" y="10" width="4" height="2" fill="#cc3333"/>
  <rect x="14" y="12" width="2" height="4" fill="#cc3333"/>
  <rect x="16" y="14" width="4" height="2" fill="#cc3333"/>
  <rect x="18" y="16" width="2" height="4" fill="#cc3333"/>
  <rect x="14" y="18" width="4" height="2" fill="#cc3333"/>
  <!-- Bottom roll -->
  <rect x="8" y="24" width="16" height="4" fill="#d4a853"/>
  <rect x="6" y="24" width="4" height="4" fill="#c49843"/>
  <rect x="22" y="24" width="4" height="4" fill="#c49843"/>
  <rect x="8" y="26" width="16" height="2" fill="#b48833"/>
  <!-- Seal/ribbon -->
  <rect x="14" y="22" width="4" height="6" fill="#cc3333"/>
  <rect x="13" y="22" width="6" height="2" fill="#cc3333"/>
  <!-- Glow effect -->
  <rect x="12" y="12" width="2" height="2" fill="#ffee88" opacity="0.5"/>
  <rect x="18" y="20" width="2" height="2" fill="#ffee88" opacity="0.5"/>
</svg>