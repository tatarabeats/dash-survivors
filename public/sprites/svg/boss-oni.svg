<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" shape-rendering="crispEdges">
  <!-- Boss Oni (Large Red Demon) - 64x64 -->
  <!-- Large horns -->
  <rect x="8" y="0" width="6" height="10" fill="#8b0000"/>
  <rect x="50" y="0" width="6" height="10" fill="#8b0000"/>
  <rect x="6" y="0" width="4" height="6" fill="#ffcc00"/>
  <rect x="54" y="0" width="4" height="6" fill="#ffcc00"/>
  <rect x="4" y="0" width="2" height="4" fill="#ffdd44"/>
  <rect x="58" y="0" width="2" height="4" fill="#ffdd44"/>
  <!-- Head -->
  <rect x="14" y="8" width="36" height="16" fill="#dd2222"/>
  <!-- Third eye -->
  <rect x="28" y="8" width="8" height="4" fill="#ffcc00"/>
  <rect x="30" y="9" width="4" height="2" fill="#111111"/>
  <!-- Eyes (fierce, glowing) -->
  <rect x="18" y="14" width="10" height="6" fill="#ffffff"/>
  <rect x="36" y="14" width="10" height="6" fill="#ffffff"/>
  <rect x="22" y="14" width="6" height="6" fill="#ffcc00"/>
  <rect x="40" y="14" width="6" height="6" fill="#ffcc00"/>
  <rect x="24" y="16" width="4" height="4" fill="#cc0000"/>
  <rect x="42" y="16" width="4" height="4" fill="#cc0000"/>
  <!-- Angry eyebrows -->
  <rect x="18" y="12" width="10" height="2" fill="#880000"/>
  <rect x="36" y="12" width="10" height="2" fill="#880000"/>
  <!-- Mouth with fangs -->
  <rect x="20" y="22" width="24" height="4" fill="#111111"/>
  <rect x="22" y="20" width="4" height="6" fill="#ffffff"/>
  <rect x="30" y="20" width="4" height="6" fill="#ffffff"/>
  <rect x="38" y="20" width="4" height="6" fill="#ffffff"/>
  <!-- Massive body -->
  <rect x="8" y="26" width="48" height="20" fill="#dd2222"/>
  <!-- Chest muscles -->
  <rect x="20" y="28" width="10" height="8" fill="#cc1111"/>
  <rect x="34" y="28" width="10" height="8" fill="#cc1111"/>
  <!-- Tiger skin belt -->
  <rect x="12" y="42" width="40" height="6" fill="#ffaa00"/>
  <rect x="16" y="42" width="6" height="4" fill="#663300"/>
  <rect x="28" y="43" width="6" height="4" fill="#663300"/>
  <rect x="40" y="42" width="6" height="4" fill="#663300"/>
  <!-- Kanabo (iron club) in right hand -->
  <rect x="54" y="20" width="6" height="24" fill="#555555"/>
  <rect x="52" y="18" width="10" height="4" fill="#666666"/>
  <rect x="56" y="22" width="4" height="2" fill="#888888"/>
  <rect x="56" y="28" width="4" height="2" fill="#888888"/>
  <rect x="56" y="34" width="4" height="2" fill="#888888"/>
  <!-- Arms -->
  <rect x="2" y="28" width="8" height="14" fill="#dd2222"/>
  <rect x="54" y="28" width="8" height="14" fill="#dd2222"/>
  <!-- Fists -->
  <rect x="0" y="38" width="8" height="8" fill="#dd2222"/>
  <rect x="56" y="38" width="8" height="8" fill="#dd2222"/>
  <!-- Legs -->
  <rect x="16" y="48" width="12" height="10" fill="#dd2222"/>
  <rect x="36" y="48" width="12" height="10" fill="#dd2222"/>
  <!-- Feet -->
  <rect x="12" y="58" width="14" height="6" fill="#aa1111"/>
  <rect x="36" y="58" width="14" height="6" fill="#aa1111"/>
  <!-- Aura / flames -->
  <rect x="6" y="6" width="2" height="4" fill="#ff6600" opacity="0.6"/>
  <rect x="56" y="6" width="2" height="4" fill="#ff6600" opacity="0.6"/>
  <rect x="4" y="10" width="2" height="4" fill="#ff4400" opacity="0.4"/>
  <rect x="58" y="10" width="2" height="4" fill="#ff4400" opacity="0.4"/>
</svg>