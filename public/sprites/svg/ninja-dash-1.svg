<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" shape-rendering="crispEdges">
  <!-- Ninja dash frame 1 - leaning forward, arms back -->
  <rect x="20" y="8" width="16" height="4" fill="#2d2d2d"/>
  <rect x="18" y="12" width="18" height="4" fill="#2d2d2d"/>
  <rect x="22" y="12" width="4" height="4" fill="#ffffff"/>
  <rect x="30" y="12" width="4" height="4" fill="#ffffff"/>
  <rect x="24" y="14" width="2" height="2" fill="#111111"/>
  <rect x="32" y="14" width="2" height="2" fill="#111111"/>
  <rect x="18" y="10" width="18" height="2" fill="#cc3333"/>
  <!-- Body leaning forward -->
  <rect x="18" y="16" width="16" height="10" fill="#1a1a2e"/>
  <rect x="18" y="22" width="16" height="2" fill="#cc3333"/>
  <!-- Arms stretched back -->
  <rect x="6" y="18" width="12" height="4" fill="#1a1a2e"/>
  <rect x="4" y="20" width="4" height="4" fill="#e8c39e"/>
  <!-- Right arm forward -->
  <rect x="34" y="14" width="6" height="4" fill="#1a1a2e"/>
  <rect x="38" y="14" width="4" height="4" fill="#e8c39e"/>
  <!-- Legs in running pose -->
  <rect x="20" y="26" width="6" height="8" fill="#1a1a2e"/>
  <rect x="28" y="28" width="6" height="8" fill="#1a1a2e"/>
  <rect x="18" y="34" width="8" height="4" fill="#4a3728"/>
  <rect x="30" y="36" width="8" height="4" fill="#4a3728"/>
  <!-- Scarf flying back -->
  <rect x="8" y="10" width="10" height="2" fill="#cc3333"/>
  <rect x="4" y="12" width="8" height="2" fill="#cc3333"/>
  <rect x="2" y="14" width="4" height="2" fill="#cc3333"/>
  <!-- Speed lines -->
  <rect x="0" y="20" width="6" height="2" fill="#ffffff" opacity="0.5"/>
  <rect x="2" y="24" width="4" height="2" fill="#ffffff" opacity="0.3"/>
</svg>