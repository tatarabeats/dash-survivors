  <rect x="14" y="30" width="20" height="4" fill="#ffaa00"/>
  <rect x="16" y="30" width="4" height="2" fill="#663300"/>
  <rect x="24" y="31" width="4" height="2" fill="#663300"/>
  <rect x="28" y="30" width="4" height="2" fill="#663300"/>
  <!-- Arms -->
  <rect x="4" y="20" width="6" height="10" fill="#cc2222"/>
  <rect x="38" y="20" width="6" height="10" fill="#cc2222"/>
  <!-- Fists -->
  <rect x="2" y="28" width="6" height="6" fill="#cc2222"/>
  <rect x="40" y="28" width="6" height="6" fill="#cc2222"/>
  <!-- Legs -->
  <rect x="14" y="34" width="8" height="8" fill="#cc2222"/>
  <rect x="26" y="34" width="8" height="8" fill="#cc2222"/>
  <!-- Feet -->
  <rect x="12" y="42" width="10" height="4" fill="#993333"/>
  <rect x="26" y="42" width="10" height="4" fill="#993333"/>
