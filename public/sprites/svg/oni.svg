<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" shape-rendering="crispEdges">
  <!-- Oni (Red Demon) enemy -->
  <!-- Horns -->
  <rect x="12" y="2" width="4" height="6" fill="#8b0000"/>
  <rect x="32" y="2" width="4" height="6" fill="#8b0000"/>
  <rect x="10" y="0" width="4" height="4" fill="#ffcc00"/>
  <rect x="34" y="0" width="4" height="4" fill="#ffcc00"/>
  <!-- Head -->
  <rect x="12" y="6" width="24" height="12" fill="#cc2222"/>
  <!-- Eyes (angry) -->
  <rect x="16" y="10" width="6" height="4" fill="#ffffff"/>
  <rect x="26" y="10" width="6" height="4" fill="#ffffff"/>
  <rect x="18" y="10" width="4" height="4" fill="#ffcc00"/>
  <rect x="28" y="10" width="4" height="4" fill="#ffcc00"/>
  <rect x="20" y="12" width="2" height="2" fill="#111111"/>
  <rect x="30" y="12" width="2" height="2" fill="#111111"/>
  <!-- Angry eyebrows -->
  <rect x="16" y="8" width="6" height="2" fill="#660000"/>
  <rect x="26" y="8" width="6" height="2" fill="#660000"/>
  <!-- Fangs / mouth -->
  <rect x="18" y="16" width="12" height="2" fill="#111111"/>
  <rect x="20" y="14" width="2" height="4" fill="#ffffff"/>
  <rect x="26" y="14" width="2" height="4" fill="#ffffff"/>
