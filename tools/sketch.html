<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Sketch → Claude</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #0a0c14;
        color: #f5efe3;
        font-family: "Segoe UI", sans-serif;
        display: flex;
        height: 100vh;
        overflow: hidden;
      }
      #toolbar {
        width: 72px;
        background: #12151f;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 12px 0;
        gap: 6px;
        border-right: 1px solid #2a2e3a;
      }
      .tool-btn {
        width: 48px;
        height: 48px;
        border: 2px solid #2a2e3a;
        border-radius: 10px;
        background: #1a1e2a;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        transition: 0.15s;
      }
      .tool-btn:hover {
        border-color: #d8b45e;
      }
      .tool-btn.active {
        border-color: #d8b45e;
        background: #2a2510;
      }
      .color-dot {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        cursor: pointer;
        border: 2px solid transparent;
        transition: 0.15s;
      }
      .color-dot:hover,
      .color-dot.active {
        border-color: #fff;
        transform: scale(1.15);
      }
      .size-btn {
        width: 40px;
        height: 40px;
        border: 1px solid #2a2e3a;
        border-radius: 8px;
        background: #1a1e2a;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #aaa;
        font-size: 11px;
      }
      .size-btn:hover {
        border-color: #d8b45e;
      }
      .size-btn.active {
        border-color: #d8b45e;
        color: #d8b45e;
      }
      #canvasWrap {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #080a10;
      }
      canvas {
        cursor: crosshair;
        border-radius: 4px;
      }
      #save-btn {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        border: 2px solid #d8b45e;
        background: #2a2510;
        cursor: pointer;
        font-size: 13px;
        color: #d8b45e;
        font-weight: 700;
        transition: 0.15s;
        margin-top: auto;
      }
      #save-btn:hover {
        background: #d8b45e;
        color: #0a0c14;
      }
      #undo-btn {
        width: 48px;
        height: 48px;
        border: 2px solid #2a2e3a;
        border-radius: 10px;
        background: #1a1e2a;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        color: #aaa;
      }
      #undo-btn:hover {
        border-color: #d8b45e;
        color: #d8b45e;
      }
      #clear-btn {
        width: 48px;
        height: 48px;
        border: 2px solid #2a2e3a;
        border-radius: 10px;
        background: #1a1e2a;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        color: #aaa;
      }
      #clear-btn:hover {
        border-color: #cf2e2f;
        color: #cf2e2f;
      }
      .sep {
        width: 36px;
        height: 1px;
        background: #2a2e3a;
        margin: 4px 0;
      }
      #status {
        position: fixed;
        bottom: 12px;
        right: 16px;
        font-size: 12px;
        color: #666;
      }
    </style>
  </head>
  <body>
    <div id="toolbar">
      <div class="tool-btn active" data-tool="pen" title="ペン">✏️</div>
      <div class="tool-btn" data-tool="eraser" title="消しゴム">🧹</div>
      <div class="tool-btn" data-tool="line" title="直線">📏</div>
      <div class="tool-btn" data-tool="rect" title="四角">⬜</div>
      <div class="tool-btn" data-tool="circle" title="丸">⭕</div>
      <div class="tool-btn" data-tool="fill" title="塗りつぶし">🪣</div>
      <div class="sep"></div>

      <div
        class="color-dot active"
        data-color="#ffffff"
        style="background: #ffffff"
        title="白"
      ></div>
      <div
        class="color-dot"
        data-color="#d8b45e"
        style="background: #d8b45e"
        title="金"
      ></div>
      <div
        class="color-dot"
        data-color="#cf2e2f"
        style="background: #cf2e2f"
        title="エンジ"
      ></div>
      <div
        class="color-dot"
        data-color="#0f1a3a"
        style="background: #0f1a3a; border: 1px solid #444"
        title="濃紺"
      ></div>
      <div
        class="color-dot"
        data-color="#111111"
        style="background: #111; border: 1px solid #444"
        title="黒"
      ></div>
      <div
        class="color-dot"
        data-color="#5cab56"
        style="background: #5cab56"
        title="緑"
      ></div>
      <div
        class="color-dot"
        data-color="#87ddd9"
        style="background: #87ddd9"
        title="水色"
      ></div>
      <div
        class="color-dot"
        data-color="#b96a31"
        style="background: #b96a31"
        title="茶"
      ></div>
      <div class="sep"></div>

      <div class="size-btn active" data-size="3">S</div>
      <div class="size-btn" data-size="8">M</div>
      <div class="size-btn" data-size="16">L</div>
      <div class="size-btn" data-size="32">XL</div>
      <div class="sep"></div>

      <div id="undo-btn" title="戻す (Ctrl+Z)">↩</div>
      <div id="clear-btn" title="全消し">CLR</div>

      <button id="save-btn" title="保存してClaudeに共有">共有</button>
    </div>

    <div id="canvasWrap">
      <canvas id="c" width="900" height="700"></canvas>
    </div>

    <div id="status">描いて「共有」で保存 → Claudeが読める</div>

    <script>
      const canvas = document.getElementById("c");
      const ctx = canvas.getContext("2d");

      // Dark background
      ctx.fillStyle = "#0e1018";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      let tool = "pen";
      let color = "#ffffff";
      let size = 3;
      let drawing = false;
      let lastX, lastY;
      let history = [];
      let shapeStart = null;
      let shapeSnapshot = null;

      function saveState() {
        history.push(canvas.toDataURL());
        if (history.length > 50) history.shift();
      }
      saveState();

      // Tools
      document.querySelectorAll(".tool-btn").forEach((b) => {
        b.addEventListener("click", () => {
          document
            .querySelectorAll(".tool-btn")
            .forEach((x) => x.classList.remove("active"));
          b.classList.add("active");
          tool = b.dataset.tool;
          canvas.style.cursor = tool === "eraser" ? "cell" : "crosshair";
        });
      });

      // Colors
      document.querySelectorAll(".color-dot").forEach((b) => {
        b.addEventListener("click", () => {
          document
            .querySelectorAll(".color-dot")
            .forEach((x) => x.classList.remove("active"));
          b.classList.add("active");
          color = b.dataset.color;
        });
      });

      // Sizes
      document.querySelectorAll(".size-btn").forEach((b) => {
        b.addEventListener("click", () => {
          document
            .querySelectorAll(".size-btn")
            .forEach((x) => x.classList.remove("active"));
          b.classList.add("active");
          size = parseInt(b.dataset.size);
        });
      });

      // Flood fill
      function floodFill(startX, startY, fillColor) {
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        const w = canvas.width;
        const h = canvas.height;
        const idx = (y, x) => (y * w + x) * 4;
        const startIdx = idx(startY, startX);
        const sr = data[startIdx],
          sg = data[startIdx + 1],
          sb = data[startIdx + 2],
          sa = data[startIdx + 3];
        const fr = parseInt(fillColor.slice(1, 3), 16),
          fg = parseInt(fillColor.slice(3, 5), 16),
          fb = parseInt(fillColor.slice(5, 7), 16);
        if (sr === fr && sg === fg && sb === fb) return;
        const match = (i) =>
          Math.abs(data[i] - sr) < 30 &&
          Math.abs(data[i + 1] - sg) < 30 &&
          Math.abs(data[i + 2] - sb) < 30;
        const stack = [[startX, startY]];
        const visited = new Set();
        while (stack.length) {
          const [x, y] = stack.pop();
          if (x < 0 || x >= w || y < 0 || y >= h) continue;
          const key = y * w + x;
          if (visited.has(key)) continue;
          visited.add(key);
          const i = idx(y, x);
          if (!match(i)) continue;
          data[i] = fr;
          data[i + 1] = fg;
          data[i + 2] = fb;
          data[i + 3] = 255;
          stack.push([x + 1, y], [x - 1, y], [x, y + 1], [x, y - 1]);
          if (visited.size > 500000) break;
        }
        ctx.putImageData(imageData, 0, 0);
      }

      canvas.addEventListener("mousedown", (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = e.offsetX * (canvas.width / rect.width);
        const y = e.offsetY * (canvas.height / rect.height);

        if (tool === "fill") {
          saveState();
          floodFill(Math.round(x), Math.round(y), color);
          return;
        }

        drawing = true;
        lastX = x;
        lastY = y;

        if (tool === "line" || tool === "rect" || tool === "circle") {
          shapeStart = { x, y };
          shapeSnapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
          saveState();
        } else {
          saveState();
        }
      });

      canvas.addEventListener("mousemove", (e) => {
        if (!drawing) return;
        const rect = canvas.getBoundingClientRect();
        const x = e.offsetX * (canvas.width / rect.width);
        const y = e.offsetY * (canvas.height / rect.height);

        if (tool === "pen" || tool === "eraser") {
          ctx.beginPath();
          ctx.moveTo(lastX, lastY);
          ctx.lineTo(x, y);
          ctx.strokeStyle = tool === "eraser" ? "#0e1018" : color;
          ctx.lineWidth = tool === "eraser" ? size * 3 : size;
          ctx.lineCap = "round";
          ctx.lineJoin = "round";
          ctx.stroke();
          lastX = x;
          lastY = y;
        } else if (shapeStart && shapeSnapshot) {
          ctx.putImageData(shapeSnapshot, 0, 0);
          ctx.strokeStyle = color;
          ctx.lineWidth = size;
          ctx.lineCap = "round";
          if (tool === "line") {
            ctx.beginPath();
            ctx.moveTo(shapeStart.x, shapeStart.y);
            ctx.lineTo(x, y);
            ctx.stroke();
          } else if (tool === "rect") {
            ctx.strokeRect(
              shapeStart.x,
              shapeStart.y,
              x - shapeStart.x,
              y - shapeStart.y,
            );
          } else if (tool === "circle") {
            const rx = Math.abs(x - shapeStart.x) / 2;
            const ry = Math.abs(y - shapeStart.y) / 2;
            const cx = (shapeStart.x + x) / 2;
            const cy = (shapeStart.y + y) / 2;
            ctx.beginPath();
            ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
            ctx.stroke();
          }
        }
      });

      canvas.addEventListener("mouseup", () => {
        drawing = false;
        shapeStart = null;
        shapeSnapshot = null;
      });
      canvas.addEventListener("mouseleave", () => {
        drawing = false;
      });

      // Undo
      document.getElementById("undo-btn").addEventListener("click", () => {
        if (history.length > 1) {
          history.pop();
          const img = new Image();
          img.onload = () => {
            ctx.drawImage(img, 0, 0);
          };
          img.src = history[history.length - 1];
        }
      });

      // Clear
      document.getElementById("clear-btn").addEventListener("click", () => {
        saveState();
        ctx.fillStyle = "#0e1018";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      });

      // Save
      document.getElementById("save-btn").addEventListener("click", () => {
        canvas.toBlob((blob) => {
          const a = document.createElement("a");
          a.href = URL.createObjectURL(blob);
          a.download = "sketch_" + Date.now() + ".png";
          a.click();
          document.getElementById("status").textContent =
            "保存した！ファイルをClaudeに貼り付けて共有";
          document.getElementById("status").style.color = "#d8b45e";
        }, "image/png");
      });

      // Keyboard shortcuts
      document.addEventListener("keydown", (e) => {
        if (e.ctrlKey && e.key === "z") {
          e.preventDefault();
          document.getElementById("undo-btn").click();
        }
      });
    </script>
  </body>
</html>
